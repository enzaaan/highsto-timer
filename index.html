<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Highsto Timer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     Design tokens
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  :root {
    --bg:         #07091b;
    --card:       rgba(10, 14, 34, 0.70);
    --card-b:     rgba(255, 255, 255, 0.065);
    --gold:       #c8a44a;
    --gold-dim:   rgba(200, 164, 74, 0.16);
    --gold-glow:  rgba(200, 164, 74, 0.22);
    --text:       #dce2f0;
    --text-dim:   #68789a;
    --text-faint: #394265;
    --danger:     #c96858;
    --ring-track: rgba(255, 255, 255, 0.075);
    --r-card:     22px;
    --r-btn:      12px;
    --r-input:    11px;
    --shadow:     0 24px 72px rgba(0,0,0,0.55), 0 0 0 0.5px rgba(255,255,255,0.035) inset;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { height: 100%; }

  body {
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    font-family: 'Inter', 'Hiragino Kaku Gothic ProN', 'ヒラギノ角ゴ ProN', sans-serif;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     Background
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  #bg {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse at 18% 14%, rgba(20, 32, 85, 0.88) 0%, transparent 52%),
      radial-gradient(ellipse at 82% 88%, rgba(38, 16, 64, 0.52) 0%, transparent 48%),
      radial-gradient(ellipse at 55% 48%, rgba(12, 18, 42, 0.4) 0%, transparent 65%),
      var(--bg);
  }

  /* キャラ差し込み予定エリア（右下の余白） */
  #char-area {
    position: fixed;
    right: 0; bottom: 0;
    width: 40vw; max-width: 520px;
    height: 92vh;
    z-index: 1;
    pointer-events: none;
    display: flex; align-items: flex-end; justify-content: flex-end;
    /* 画像を入れるときは img タグを追加し opacity: 0.18 程度で配置 */
  }

  /* 残り5秒フラッシュ */
  #flash {
    display: none;
    position: fixed; inset: 0; z-index: 2;
    background: rgba(180, 60, 40, 0.22);
    pointer-events: none;
    animation: do-flash 0.65s infinite;
  }
  #flash.on { display: block; }

  @keyframes do-flash {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     Header
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  header {
    position: relative; z-index: 10;
    display: flex; align-items: flex-start; justify-content: space-between;
    padding: 28px 40px 0;
    flex-shrink: 0;
  }

  .h-left {}

  .h-title {
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.28em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .h-sub {
    font-size: 0.7rem;
    color: var(--text-faint);
    letter-spacing: 0.08em;
  }

  .h-right {
    text-align: right;
    flex-shrink: 0;
  }

  #ct {
    display: block;
    font-family: 'Inter', sans-serif;
    font-size: 1.3rem;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.04em;
    color: var(--text);
    line-height: 1;
    margin-bottom: 4px;
  }

  #cd {
    font-size: 0.72rem;
    color: var(--text-dim);
    letter-spacing: 0.06em;
  }

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     Main
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  main {
    position: relative; z-index: 10;
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 28px 40px 40px;
    min-height: 0;
  }

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     Tabs
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  .tabs {
    display: inline-flex;
    background: rgba(0,0,0,0.28);
    border: 1px solid var(--card-b);
    border-radius: 40px;
    padding: 4px;
    gap: 3px;
    margin-bottom: 28px;
    align-self: flex-start;
  }

  .tab {
    padding: 8px 24px;
    background: transparent;
    border: none;
    border-radius: 36px;
    color: var(--text-dim);
    font-family: inherit;
    font-size: 0.82rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: background 0.25s, color 0.25s;
  }

  .tab.active {
    background: var(--gold);
    color: #0a0b1a;
  }

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     2-column content
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  .content {
    display: flex;
    gap: 36px;
    align-items: center;
    flex: 1;
    min-height: 0;
  }

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     Left pane (settings card)
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  .pane-left {
    flex-shrink: 0;
    width: 268px;
    background: var(--card);
    backdrop-filter: blur(20px) saturate(1.4);
    -webkit-backdrop-filter: blur(20px) saturate(1.4);
    border: 1px solid var(--card-b);
    border-radius: var(--r-card);
    box-shadow: var(--shadow);
    padding: 28px 24px 24px;
  }

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     Right pane (display)
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  .pane-right {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-width: 0;
  }

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     Mode toggle
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  .mode-toggle {
    display: flex;
    background: rgba(0,0,0,0.25);
    border-radius: 9px;
    padding: 3px;
    gap: 2px;
    margin-bottom: 22px;
  }

  .mode-btn {
    flex: 1;
    padding: 7px 0;
    background: transparent;
    border: none;
    border-radius: 7px;
    color: var(--text-faint);
    font-family: inherit;
    font-size: 0.74rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }

  .mode-btn.active {
    background: rgba(255,255,255,0.09);
    color: var(--text);
  }

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     Input fields
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  .field { margin-bottom: 16px; }

  .field-label {
    display: block;
    font-size: 0.66rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-bottom: 7px;
  }

  .field-row { display: flex; align-items: center; gap: 10px; }

  input[type="number"],
  input[type="time"] {
    flex: 1;
    width: 100%;
    background: rgba(0,0,0,0.32);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: var(--r-input);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 1.55rem;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    padding: 10px 14px;
    text-align: center;
    transition: border-color 0.2s, box-shadow 0.2s;
    -webkit-appearance: none;
    appearance: none;
  }

  input[type="number"]:focus,
  input[type="time"]:focus {
    outline: none;
    border-color: rgba(200,164,74,0.5);
    box-shadow: 0 0 0 3px var(--gold-dim);
  }

  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
  input[type="number"] { -moz-appearance: textfield; }

  .field-unit {
    font-size: 0.8rem;
    color: var(--text-dim);
    flex-shrink: 0;
    letter-spacing: 0.04em;
  }

  .field-err {
    font-size: 0.7rem;
    color: var(--danger);
    margin-top: 5px;
    min-height: 1em;
  }

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     Presets
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  .preset-label {
    font-size: 0.64rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-bottom: 8px;
  }

  .presets {
    display: flex;
    gap: 6px;
    margin-bottom: 22px;
  }

  .preset {
    flex: 1;
    padding: 8px 2px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 9px;
    color: var(--text-dim);
    font-family: inherit;
    font-size: 0.74rem;
    font-weight: 600;
    letter-spacing: 0.02em;
    cursor: pointer;
    transition: background 0.18s, color 0.18s, border-color 0.18s;
  }

  .preset:hover {
    background: var(--gold-dim);
    border-color: rgba(200,164,74,0.28);
    color: var(--gold);
  }

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     Divider
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  .sep {
    border: none;
    border-top: 1px solid rgba(255,255,255,0.055);
    margin: 20px 0;
  }

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     Buttons
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  .btn-row { display: flex; gap: 8px; margin-bottom: 8px; }
  .btn-row-sub { display: flex; gap: 8px; justify-content: flex-end; }

  .btn {
    border: none;
    border-radius: var(--r-btn);
    font-family: inherit;
    font-weight: 600;
    cursor: pointer;
    transition: filter 0.15s, opacity 0.15s, background 0.15s;
    letter-spacing: 0.04em;
  }
  .btn:disabled { opacity: 0.28; cursor: not-allowed; }

  /* Primary: gold gradient */
  .btn-primary {
    flex: 2;
    padding: 13px 12px;
    background: linear-gradient(135deg, #c8a44a 0%, #a8842e 100%);
    color: #0b0d1e;
    font-size: 0.9rem;
    font-weight: 700;
  }
  .btn-primary:not(:disabled):hover { filter: brightness(1.1); }

  /* Secondary: ghost */
  .btn-ghost {
    flex: 1;
    padding: 13px 8px;
    background: rgba(255,255,255,0.055);
    border: 1px solid rgba(255,255,255,0.08);
    color: var(--text-dim);
    font-size: 0.84rem;
  }
  .btn-ghost:not(:disabled):hover {
    background: rgba(255,255,255,0.09);
    color: var(--text);
  }

  /* Utility icon buttons */
  .btn-util {
    padding: 10px 14px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.07);
    color: var(--text-faint);
    font-size: 0.82rem;
    border-radius: 10px;
  }
  .btn-util:not(:disabled):hover {
    background: rgba(255,255,255,0.08);
    color: var(--text-dim);
  }

  /* Danger */
  .btn-danger {
    width: 100%;
    padding: 13px;
    margin-top: 10px;
    background: rgba(201,104,88,0.75);
    color: #fff;
    font-size: 0.88rem;
    font-weight: 700;
    border-radius: var(--r-btn);
  }
  .btn-danger:hover { background: rgba(201,104,88,0.92); }

  #alarm-row { display: none; }

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     Ring (normal view)
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  .ring-wrap {
    position: relative;
    width: 260px; height: 260px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 20px;
  }

  .ring-svg {
    position: absolute; inset: 0;
    transform: rotate(-90deg);
  }

  .ring-track {
    fill: none;
    stroke: var(--ring-track);
    stroke-width: 8;
  }

  .ring-prog {
    fill: none;
    stroke: var(--gold);
    stroke-width: 8;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.7s ease, stroke 0.4s;
    filter: drop-shadow(0 0 8px var(--gold-glow));
  }

  .ring-inner {
    position: relative; z-index: 1;
    text-align: center;
    user-select: none;
  }

  #timer-display {
    display: block;
    font-family: 'Inter', sans-serif;
    font-size: 3.1rem;
    font-weight: 800;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.02em;
    line-height: 1;
    color: var(--text);
    text-shadow: 0 0 40px var(--gold-glow);
  }

  #timer-status {
    margin-top: 8px;
    font-size: 0.65rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-faint);
  }

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     Stopwatch display (right pane)
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  #sw-display {
    font-family: 'Inter', sans-serif;
    font-size: 4.2rem;
    font-weight: 800;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.05em;
    color: var(--text);
    user-select: none;
  }

  /* Stopwatch controls in left pane */
  .sw-pane-inner {
    padding-top: 8px;
  }

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     Fullscreen overlay
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  #fullscreen {
    display: none;
    position: fixed; inset: 0; z-index: 500;
    background:
      radial-gradient(ellipse at 18% 14%, rgba(20, 32, 85, 0.88) 0%, transparent 52%),
      radial-gradient(ellipse at 82% 88%, rgba(38, 16, 64, 0.52) 0%, transparent 48%),
      #07091b;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  #fullscreen.on { display: flex; }

  #fs-back {
    position: absolute; top: 24px; right: 28px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.09);
    border-radius: 10px;
    color: var(--text-dim);
    font-family: inherit;
    font-size: 0.78rem;
    font-weight: 500;
    letter-spacing: 0.06em;
    padding: 9px 18px;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }
  #fs-back:hover { background: rgba(255,255,255,0.11); color: var(--text); }

  .fs-ring-wrap {
    position: relative;
    width: min(62vmin, 460px);
    height: min(62vmin, 460px);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 28px;
  }

  #fs-ring-svg {
    position: absolute; inset: 0;
    transform: rotate(-90deg);
    filter: drop-shadow(0 0 18px var(--gold-glow)) drop-shadow(0 0 40px rgba(200,164,74,0.12));
  }

  #fs-ring-track { fill: none; stroke: rgba(255,255,255,0.06); stroke-width: 5; }
  #fs-ring-prog {
    fill: none;
    stroke: var(--gold);
    stroke-width: 5;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.7s ease, stroke 0.4s;
  }

  .fs-inner {
    position: relative; z-index: 1;
    text-align: center;
    user-select: none;
  }

  #fs-time {
    display: block;
    font-family: 'Inter', sans-serif;
    font-size: clamp(4.8rem, 16vmin, 12rem);
    font-weight: 900;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.03em;
    line-height: 1;
    color: var(--text);
    text-shadow: 0 0 80px var(--gold-glow), 0 0 140px rgba(200,164,74,0.1);
  }

  #fs-timeup {
    display: none;
    margin-top: 14px;
    font-size: 0.88rem;
    font-weight: 600;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--gold);
    opacity: 0.9;
  }

  #fs-alarm-btn {
    display: none;
    position: absolute;
    bottom: 60px;
    background: rgba(201,104,88,0.82);
    border: none;
    border-radius: 14px;
    color: #fff;
    font-family: inherit;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    padding: 16px 52px;
    cursor: pointer;
    animation: alarm-pulse 1.1s ease-in-out infinite;
  }

  @keyframes alarm-pulse {
    0%,100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(201,104,88,0.4); }
    50% { transform: scale(1.025); box-shadow: 0 0 0 10px rgba(201,104,88,0); }
  }

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     Responsive – mobile (< 700px)
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  @media (max-width: 700px) {
    header { padding: 20px 20px 0; }
    main { padding: 20px 20px 32px; }

    .h-title { font-size: 0.7rem; }
    #ct { font-size: 1.05rem; }

    .tabs { margin-bottom: 20px; }
    .tab { padding: 7px 18px; font-size: 0.78rem; }

    .content {
      flex-direction: column;
      align-items: stretch;
      gap: 24px;
    }

    /* On mobile: right pane (display) comes first visually */
    .pane-right { order: -1; }
    .pane-left { width: 100%; }

    .ring-wrap { width: 220px; height: 220px; margin: 0 auto 16px; }
    #timer-display { font-size: 2.6rem; }
    #sw-display { font-size: 3.2rem; }
  }

  /* Compact height */
  @media (max-height: 680px) {
    header { padding-top: 14px; }
    main { padding-top: 16px; padding-bottom: 20px; }
    .tabs { margin-bottom: 16px; }
    .ring-wrap { width: 210px; height: 210px; }
    #timer-display { font-size: 2.6rem; }
    .sep { margin: 14px 0; }
  }
  </style>
</head>
<body>

<div id="bg"></div>
<div id="char-area"></div>
<div id="flash"></div>

<!-- ━━━━ Header ━━━━ -->
<header>
  <div class="h-left">
    <div class="h-title">Highsto Timer</div>
    <div class="h-sub">集中と対戦の時間管理</div>
  </div>
  <div class="h-right">
    <span id="ct">00:00:00</span>
    <span id="cd"></span>
  </div>
</header>

<!-- ━━━━ Main ━━━━ -->
<main>
  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" id="tab-timer" onclick="switchTab('timer')">タイマー</button>
    <button class="tab" id="tab-sw" onclick="switchTab('sw')">ストップウォッチ</button>
  </div>

  <!-- 2-column layout -->
  <div class="content">

    <!-- Left: settings card -->
    <div class="pane-left">

      <!-- ── Timer pane ── -->
      <div id="p-timer">
        <!-- Mode toggle -->
        <div class="mode-toggle">
          <button class="mode-btn active" id="m-min" onclick="setMode('min')">分数指定</button>
          <button class="mode-btn" id="m-end" onclick="setMode('end')">終了時刻指定</button>
        </div>

        <!-- Minutes input -->
        <div class="field" id="f-min">
          <label class="field-label" for="inp-min">設定時間</label>
          <div class="field-row">
            <input type="number" id="inp-min" min="1" max="999" placeholder="10">
            <span class="field-unit">分</span>
          </div>
          <div class="field-err" id="err-min"></div>
        </div>

        <!-- End-time input -->
        <div class="field" id="f-end" style="display:none">
          <label class="field-label" for="inp-end">終了時刻</label>
          <div class="field-row">
            <input type="time" id="inp-end">
          </div>
          <div class="field-err" id="err-end"></div>
        </div>

        <!-- Presets -->
        <div class="preset-label">クイックスタート</div>
        <div class="presets">
          <button class="preset" onclick="doPreset(5)">5分</button>
          <button class="preset" onclick="doPreset(10)">10分</button>
          <button class="preset" onclick="doPreset(20)">20分</button>
          <button class="preset" onclick="doPreset(30)">30分</button>
          <button class="preset" onclick="doPreset(60)">60分</button>
        </div>

        <hr class="sep">

        <!-- Main controls -->
        <div class="btn-row">
          <button class="btn btn-primary" id="btn-start" onclick="startTimer()">開始</button>
          <button class="btn btn-ghost" id="btn-cancel" onclick="cancelTimer()" disabled>キャンセル</button>
        </div>

        <!-- Utility controls -->
        <div class="btn-row-sub">
          <button class="btn btn-util" id="btn-mute" onclick="toggleMute()" title="ミュート切替">🔊 ミュート</button>
          <button class="btn btn-util" id="btn-fs" onclick="enterFS()" disabled title="全画面表示">⛶ 全画面</button>
        </div>

        <!-- Alarm stop -->
        <div id="alarm-row">
          <button class="btn btn-danger" onclick="stopAlarm()">🔔 アラーム停止</button>
        </div>
      </div><!-- /#p-timer -->

      <!-- ── SW pane ── -->
      <div id="p-sw" style="display:none">
        <div class="sw-pane-inner">
          <hr class="sep" style="margin-top:0">
          <div class="btn-row">
            <button class="btn btn-primary" id="sw-start" onclick="swStart()">開始</button>
            <button class="btn btn-ghost" id="sw-stop" onclick="swStop()" disabled>停止</button>
          </div>
          <div class="btn-row" style="margin-top:8px">
            <button class="btn btn-ghost" style="flex:1" id="sw-reset" onclick="swReset()">リセット</button>
          </div>
        </div>
      </div>

    </div><!-- /.pane-left -->

    <!-- Right: display area -->
    <div class="pane-right">

      <!-- Timer display -->
      <div id="disp-timer">
        <div class="ring-wrap">
          <svg class="ring-svg" viewBox="0 0 260 260">
            <circle class="ring-track" cx="130" cy="130" r="116"/>
            <circle class="ring-prog" id="ring" cx="130" cy="130" r="116"/>
          </svg>
          <div class="ring-inner">
            <span id="timer-display">--:--</span>
            <div id="timer-status">待機中</div>
          </div>
        </div>
      </div>

      <!-- Stopwatch display -->
      <div id="disp-sw" style="display:none">
        <span id="sw-display">00:00.00</span>
      </div>

    </div><!-- /.pane-right -->
  </div><!-- /.content -->
</main>

<!-- ━━━━ Fullscreen ━━━━ -->
<div id="fullscreen">
  <button id="fs-back" onclick="exitFS()">戻る</button>

  <div class="fs-ring-wrap">
    <svg id="fs-ring-svg" viewBox="0 0 300 300">
      <circle id="fs-ring-track" cx="150" cy="150" r="135"/>
      <circle id="fs-ring-prog" cx="150" cy="150" r="135"/>
    </svg>
    <div class="fs-inner">
      <span id="fs-time">--:--</span>
      <div id="fs-timeup">TIME UP</div>
    </div>
  </div>

  <button id="fs-alarm-btn" onclick="stopAlarm()">🔔 アラーム停止</button>
</div>

<script>
'use strict';

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   Ring constants
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
const RING_R = 116, RING_C = +(2 * Math.PI * RING_R).toFixed(2);  // ≈ 729.0
const FS_R   = 135, FS_C   = +(2 * Math.PI * FS_R).toFixed(2);    // ≈ 848.2

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   State
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
let S = {
  tab: 'timer',
  mode: 'min',
  min: '',
  end: '',
  muted: false,

  running: false,
  endTs: 0,
  totalSec: 0,
  finished: false,
  alarmOn: false,
  tickId: null,

  isFS: false,

  swRunning: false,
  swStartTs: 0,
  swElapsed: 0,
  swTickId: null,
};

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   Persist
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function persist() {
  try {
    localStorage.setItem('hst3', JSON.stringify({
      tab: S.tab, mode: S.mode,
      min: S.min, end: S.end, muted: S.muted,
    }));
  } catch(e) {}
}

function restore() {
  try {
    const d = JSON.parse(localStorage.getItem('hst3') || '{}');
    if (d.tab)  S.tab  = d.tab;
    if (d.mode) S.mode = d.mode;
    if (d.min)  S.min  = d.min;
    if (d.end)  S.end  = d.end;
    if (typeof d.muted === 'boolean') S.muted = d.muted;
  } catch(e) {}
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   Clock (JST)
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
const DAYS = ['日','月','火','水','木','金','土'];
const p2 = n => String(n).padStart(2, '0');

function clock() {
  const jst = new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Tokyo' }));
  document.getElementById('ct').textContent =
    `${p2(jst.getHours())}:${p2(jst.getMinutes())}:${p2(jst.getSeconds())}`;
  document.getElementById('cd').textContent =
    `${jst.getFullYear()}/${p2(jst.getMonth()+1)}/${p2(jst.getDate())}(${DAYS[jst.getDay()]})`;
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   Tab / Mode switching
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function switchTab(tab) {
  S.tab = tab;
  const isTimer = tab === 'timer';
  document.getElementById('tab-timer').classList.toggle('active', isTimer);
  document.getElementById('tab-sw').classList.toggle('active', !isTimer);
  document.getElementById('p-timer').style.display   = isTimer ? '' : 'none';
  document.getElementById('p-sw').style.display      = isTimer ? 'none' : '';
  document.getElementById('disp-timer').style.display = isTimer ? '' : 'none';
  document.getElementById('disp-sw').style.display    = isTimer ? 'none' : '';
  persist();
}

function setMode(mode) {
  S.mode = mode;
  document.getElementById('m-min').classList.toggle('active', mode === 'min');
  document.getElementById('m-end').classList.toggle('active', mode === 'end');
  document.getElementById('f-min').style.display = mode === 'min' ? '' : 'none';
  document.getElementById('f-end').style.display = mode === 'end' ? '' : 'none';
  clearErrs();
  persist();
}

function clearErrs() {
  document.getElementById('err-min').textContent = '';
  document.getElementById('err-end').textContent = '';
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   Timer – start / validate
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function doPreset(min) {
  if (S.running || S.alarmOn) return;
  setMode('min');
  document.getElementById('inp-min').value = min;
  S.min = min;
  startWith(min * 60);
}

function startTimer() {
  if (S.running || S.alarmOn) return;
  clearErrs();

  if (S.mode === 'min') {
    const v = parseInt(document.getElementById('inp-min').value, 10);
    if (!v || v < 1) {
      document.getElementById('err-min').textContent = '1以上の整数を入力してください';
      return;
    }
    S.min = v; persist();
    startWith(v * 60);

  } else {
    const ts = document.getElementById('inp-end').value;
    if (!ts) { document.getElementById('err-end').textContent = '終了時刻を入力してください'; return; }
    const [h, m] = ts.split(':').map(Number);
    const now = new Date();
    const endDate = new Date(now.getFullYear(), now.getMonth(), now.getDate(), h, m, 0, 0);
    const diff = Math.floor((endDate - now) / 1000);
    if (diff <= 0) { document.getElementById('err-end').textContent = '現在時刻より後を指定してください'; return; }
    S.end = ts; persist();
    startWith(diff);
  }
}

function startWith(totalSec) {
  S.running = true; S.finished = false;
  S.totalSec = totalSec;
  S.endTs = Date.now() + totalSec * 1000;

  el('btn-start').disabled  = true;
  el('btn-cancel').disabled = false;
  el('btn-fs').disabled     = false;

  clearInterval(S.tickId);
  S.tickId = setInterval(tick, 250);
  tick();
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   Timer – tick
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function tick() {
  if (!S.running) return;
  const rem = Math.max(0, Math.ceil((S.endTs - Date.now()) / 1000));

  renderTimer(rem);
  if (S.isFS) syncFS(rem);

  // Flash: last 5 sec
  el('flash').classList.toggle('on', rem > 0 && rem <= 5);

  if (rem <= 0) timeup();
}

function renderTimer(rem) {
  const m = Math.floor(rem / 60), s = rem % 60;
  el('timer-display').textContent = `${p2(m)}:${p2(s)}`;

  const prog  = S.totalSec > 0 ? rem / S.totalSec : 0;
  const off   = RING_C * (1 - Math.max(0, Math.min(1, prog)));
  const ring  = el('ring');
  ring.style.strokeDasharray  = RING_C;
  ring.style.strokeDashoffset = off;
  ring.style.stroke = (rem > 0 && rem <= 5) ? '#c97060' : 'var(--gold)';
}

function syncFS(rem) {
  const m = Math.floor(rem / 60), s = rem % 60;
  el('fs-time').textContent = `${p2(m)}:${p2(s)}`;

  const prog = S.totalSec > 0 ? rem / S.totalSec : 0;
  const off  = FS_C * (1 - Math.max(0, Math.min(1, prog)));
  const r    = el('fs-ring-prog');
  r.style.strokeDasharray  = FS_C;
  r.style.strokeDashoffset = off;
  r.style.stroke = (rem > 0 && rem <= 5) ? '#c97060' : 'var(--gold)';
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   Timer – finish / cancel
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function timeup() {
  clearInterval(S.tickId);
  S.running = false; S.finished = true; S.alarmOn = true;
  el('flash').classList.remove('on');

  el('timer-display').textContent = '00:00';
  el('timer-status').textContent  = 'TIME UP';
  renderTimer(0);
  if (S.isFS) syncFS(0);

  el('alarm-row').style.display   = '';
  el('fs-alarm-btn').style.display = '';
  el('fs-timeup').style.display    = '';

  if (!S.muted) alarmStart();
}

function cancelTimer() {
  clearInterval(S.tickId);
  S.running = false; S.finished = false; S.alarmOn = false;
  el('flash').classList.remove('on');
  alarmStop();
  resetUI();
}

function resetUI() {
  el('timer-display').textContent = '--:--';
  el('timer-status').textContent  = '待機中';
  el('btn-start').disabled  = false;
  el('btn-cancel').disabled = true;
  el('btn-fs').disabled     = true;
  el('alarm-row').style.display    = 'none';
  el('fs-alarm-btn').style.display = 'none';
  el('fs-timeup').style.display    = 'none';

  const ring = el('ring');
  ring.style.strokeDasharray  = RING_C;
  ring.style.strokeDashoffset = RING_C;
  ring.style.stroke = 'var(--gold)';

  const fsr = el('fs-ring-prog');
  fsr.style.strokeDasharray  = FS_C;
  fsr.style.strokeDashoffset = FS_C;
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   Alarm (Web Audio API)
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
let actx = null, alarmId = null;

function getCtx() {
  if (!actx || actx.state === 'closed')
    actx = new (window.AudioContext || window.webkitAudioContext)();
  if (actx.state === 'suspended') actx.resume();
  return actx;
}

function beep() {
  try {
    const ctx = getCtx(), t = ctx.currentTime;
    const o1 = ctx.createOscillator(), o2 = ctx.createOscillator();
    const g  = ctx.createGain();
    o1.connect(g); o2.connect(g); g.connect(ctx.destination);
    o1.type = 'square'; o1.frequency.value = 880;
    o2.type = 'square'; o2.frequency.value = 660;
    g.gain.setValueAtTime(0.18, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.42);
    o1.start(t); o1.stop(t + 0.14);
    o2.start(t + 0.14); o2.stop(t + 0.42);
  } catch(e) {}
}

function alarmStart() { beep(); alarmId = setInterval(beep, 1300); }

function alarmStop() {
  clearInterval(alarmId);
  S.alarmOn = false;
  el('alarm-row').style.display    = 'none';
  el('fs-alarm-btn').style.display = 'none';
  el('fs-timeup').style.display    = 'none';
  el('btn-start').disabled  = false;
  el('btn-cancel').disabled = true;
}

function stopAlarm() { alarmStop(); }

function toggleMute() {
  S.muted = !S.muted;
  el('btn-mute').textContent = S.muted ? '🔇 ミュート中' : '🔊 ミュート';
  if (S.muted) clearInterval(alarmId);
  else if (S.alarmOn) alarmStart();
  persist();
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   Fullscreen
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function enterFS() {
  if (!S.running && !S.alarmOn && !S.finished) return;
  S.isFS = true;
  el('fullscreen').classList.add('on');

  // Init fullscreen ring
  const fsr = el('fs-ring-prog');
  fsr.style.strokeDasharray  = FS_C;
  fsr.style.strokeDashoffset = FS_C;
  fsr.style.stroke = 'var(--gold)';

  const rem = S.running ? Math.max(0, Math.ceil((S.endTs - Date.now()) / 1000)) : 0;
  syncFS(rem);

  if (S.alarmOn) {
    el('fs-alarm-btn').style.display = '';
    el('fs-timeup').style.display    = '';
  }
}

function exitFS() {
  S.isFS = false;
  el('fullscreen').classList.remove('on');
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   Stopwatch
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function swStart() {
  if (S.swRunning) return;
  S.swRunning = true;
  S.swStartTs = Date.now() - S.swElapsed;
  el('sw-start').disabled = true;
  el('sw-stop').disabled  = false;
  S.swTickId = setInterval(swTick, 17);
  swTick();
}

function swStop() {
  if (!S.swRunning) return;
  S.swRunning = false;
  S.swElapsed = Date.now() - S.swStartTs;
  clearInterval(S.swTickId);
  el('sw-start').disabled = false;
  el('sw-stop').disabled  = true;
}

function swReset() {
  clearInterval(S.swTickId);
  S.swRunning = false; S.swElapsed = 0; S.swStartTs = 0;
  el('sw-display').textContent = '00:00.00';
  el('sw-start').disabled = false;
  el('sw-stop').disabled  = true;
}

function swTick() {
  const e  = S.swRunning ? Date.now() - S.swStartTs : S.swElapsed;
  const cs = Math.floor(e / 10) % 100;
  const s  = Math.floor(e / 1000) % 60;
  const m  = Math.floor(e / 60000);
  el('sw-display').textContent =
    `${p2(m)}:${p2(s)}.${p2(cs)}`;
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   Util
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function el(id) { return document.getElementById(id); }

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   Init
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function init() {
  restore();

  // Ring initial state
  const ring = el('ring');
  ring.style.strokeDasharray  = RING_C;
  ring.style.strokeDashoffset = RING_C;
  ring.style.stroke = 'var(--gold)';

  const fsr = el('fs-ring-prog');
  fsr.style.strokeDasharray  = FS_C;
  fsr.style.strokeDashoffset = FS_C;
  fsr.style.stroke = 'var(--gold)';

  // FS ring CSS (not set via class, set directly)
  el('fs-ring-track').setAttribute('fill', 'none');
  el('fs-ring-track').setAttribute('stroke', 'rgba(255,255,255,0.06)');
  el('fs-ring-track').setAttribute('stroke-width', '5');
  el('fs-ring-prog').setAttribute('fill', 'none');
  el('fs-ring-prog').setAttribute('stroke-width', '5');
  el('fs-ring-prog').setAttribute('stroke-linecap', 'round');

  // Restore state
  switchTab(S.tab);
  setMode(S.mode);
  if (S.min) el('inp-min').value = S.min;
  if (S.end) el('inp-end').value = S.end;
  el('btn-mute').textContent = S.muted ? '🔇 ミュート中' : '🔊 ミュート';

  // Input change listeners
  el('inp-min').addEventListener('input', function() { S.min = this.value; persist(); });
  el('inp-end').addEventListener('change', function() { S.end = this.value; persist(); });

  // Clock
  clock(); setInterval(clock, 1000);
}

init();
</script>
