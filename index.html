<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Highsto Timer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
  :root {
    --gold:       #c8a44a;
    --gold-glow:  rgba(200,164,74,0.30);
    --danger:     #c96858;
    --text:       rgba(255,255,255,0.95);
    --dim:        rgba(255,255,255,0.52);
    --faint:      rgba(255,255,255,0.30);
    --ui-bg:      rgba(0,0,0,0.50);
    --ui-bd:      rgba(255,255,255,0.12);
    --rs:         272px;   /* ring size */
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { height: 100%; }

  body {
    min-height: 100dvh;
    overflow: hidden;
    font-family: 'Inter', 'Hiragino Kaku Gothic ProN', sans-serif;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }

  /* ━━━ Background ━━━ */
  #bg-a, #bg-b {
    position: fixed; inset: 0; z-index: 0;
    background-size: cover;
    background-position: center center;
    transition: opacity 1.2s ease;
  }
  #bg-a { opacity: 1; }
  #bg-b { opacity: 0; }

  /* Vignette + readability overlay */
  #ov {
    position: fixed; inset: 0; z-index: 1;
    background:
      radial-gradient(ellipse at 50% 42%, transparent 30%, rgba(0,0,0,0.45) 100%),
      rgba(0,0,0,0.28);
  }

  /* Last-5-sec flash */
  #flash {
    display: none;
    position: fixed; inset: 0; z-index: 2;
    background: rgba(140,30,16,0.28);
    pointer-events: none;
    animation: blink 0.65s ease-in-out infinite;
  }
  #flash.on { display: block; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  /* ━━━ App shell ━━━ */
  #app {
    position: fixed; inset: 0; z-index: 10;
    display: flex; flex-direction: column;
    pointer-events: none;   /* children set their own */
  }
  #app > * { pointer-events: auto; }

  /* ━━━ Header ━━━ */
  header {
    display: flex; align-items: flex-start; justify-content: space-between;
    padding: 22px 26px 0;
    flex-shrink: 0;
  }

  .logo-mark {
    font-size: 0.68rem; font-weight: 800;
    letter-spacing: 0.26em; text-transform: uppercase;
    color: var(--gold);
    text-shadow: 0 0 20px var(--gold-glow);
    margin-bottom: 3px; line-height: 1;
  }
  .logo-sub {
    font-size: 0.58rem; color: var(--faint);
    letter-spacing: 0.08em;
  }

  .hclock { text-align: right; }
  #ct {
    display: block;
    font-family: 'Inter', sans-serif;
    font-size: 1.18rem; font-weight: 600;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.04em; line-height: 1;
    text-shadow: 0 1px 10px rgba(0,0,0,0.8);
    margin-bottom: 3px;
  }
  #cd { font-size: 0.64rem; color: var(--dim); letter-spacing: 0.05em; }

  /* ━━━ Center ━━━ */
  .center {
    flex: 1; min-height: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 8px 20px;
  }

  /* Tabs */
  .tabs {
    display: inline-flex;
    background: var(--ui-bg);
    border: 1px solid var(--ui-bd);
    border-radius: 40px;
    padding: 4px; gap: 3px;
    margin-bottom: 14px;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  .tab {
    padding: 7px 22px;
    background: transparent; border: none; border-radius: 36px;
    color: var(--dim);
    font-family: inherit; font-size: 0.79rem; font-weight: 600;
    letter-spacing: 0.06em; cursor: pointer;
    transition: background 0.22s, color 0.22s;
  }
  .tab.active { background: var(--gold); color: #0a0b18; }

  /* Status label */
  #slbl {
    font-size: 0.64rem; font-weight: 500;
    letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--faint);
    text-shadow: 0 1px 8px rgba(0,0,0,0.9);
    margin-bottom: 8px; min-height: 1em;
  }

  /* ━━━ Ring ━━━ */
  .ring-wrap {
    position: relative;
    width: var(--rs); height: var(--rs);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .ring-svg {
    position: absolute; inset: 0;
    transform: rotate(-90deg); overflow: visible;
    filter: drop-shadow(0 0 12px var(--gold-glow));
  }
  .rt { fill: none; stroke: rgba(255,255,255,0.08); stroke-width: 5.5; }
  .rp {
    fill: none; stroke: var(--gold); stroke-width: 5.5; stroke-linecap: round;
    transition: stroke-dashoffset 0.75s ease, stroke 0.4s;
  }
  .ri { position: relative; z-index: 1; text-align: center; user-select: none; }

  #tdisp {
    display: block;
    font-family: 'Inter', sans-serif;
    font-size: 2.85rem; font-weight: 800;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.02em; line-height: 1;
    text-shadow: 0 2px 28px rgba(0,0,0,0.75);
  }
  #tsub {
    font-size: 0.56rem; color: var(--faint);
    letter-spacing: 0.14em; text-transform: uppercase;
    margin-top: 7px; min-height: 1em;
    text-shadow: 0 1px 6px rgba(0,0,0,0.9);
  }

  /* ━━━ Timer controls (float below ring, no card) ━━━ */
  #tctrl {
    margin-top: 16px;
    width: 100%; max-width: 300px;
    display: flex; flex-direction: column;
    align-items: center; gap: 8px;
  }

  /* Mode toggle */
  .mtgl {
    display: flex; width: 100%;
    background: var(--ui-bg); border: 1px solid var(--ui-bd);
    border-radius: 9px; padding: 3px; gap: 2px;
    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  }
  .mbtn {
    flex: 1; padding: 7px 0;
    background: transparent; border: none; border-radius: 7px;
    color: var(--faint);
    font-family: inherit; font-size: 0.72rem; font-weight: 600;
    letter-spacing: 0.04em; cursor: pointer;
    transition: background 0.18s, color 0.18s;
  }
  .mbtn.active { background: rgba(255,255,255,0.13); color: var(--text); }

  /* Input row */
  .irow { display: flex; align-items: center; gap: 8px; width: 100%; }
  input[type="number"], input[type="time"] {
    flex: 1; width: 100%;
    background: var(--ui-bg); border: 1px solid var(--ui-bd); border-radius: 10px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 1.45rem; font-weight: 700; font-variant-numeric: tabular-nums;
    padding: 9px 14px; text-align: center;
    transition: border-color 0.2s, box-shadow 0.2s;
    -webkit-appearance: none; appearance: none;
    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  }
  input:focus {
    outline: none;
    border-color: rgba(200,164,74,0.6);
    box-shadow: 0 0 0 3px rgba(200,164,74,0.14);
  }
  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
  input[type="number"] { -moz-appearance: textfield; }
  .iunit { font-size: 0.78rem; color: var(--dim); flex-shrink: 0; }
  .ferr  { font-size: 0.68rem; color: var(--danger); min-height: 1em; align-self: flex-start; }

  /* Presets */
  .psets { display: flex; gap: 5px; width: 100%; }
  .pst {
    flex: 1; padding: 7px 2px;
    background: var(--ui-bg); border: 1px solid var(--ui-bd); border-radius: 8px;
    color: var(--dim);
    font-family: inherit; font-size: 0.71rem; font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
    backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
  }
  .pst:hover { background: rgba(200,164,74,0.22); border-color: rgba(200,164,74,0.4); color: var(--gold); }

  /* Buttons */
  .brow { display: flex; gap: 7px; width: 100%; }
  .btn {
    border: none; border-radius: 11px;
    font-family: inherit; font-weight: 600;
    cursor: pointer; letter-spacing: 0.04em;
    transition: filter 0.15s, opacity 0.15s;
  }
  .btn:disabled { opacity: 0.28; cursor: not-allowed; }

  .btn-go {
    flex: 2; padding: 13px 10px;
    background: linear-gradient(140deg, #d4af52 0%, #a8832c 100%);
    color: #09090f; font-size: 0.9rem; font-weight: 700;
  }
  .btn-go:not(:disabled):hover { filter: brightness(1.1); }

  .btn-ghost {
    flex: 1; padding: 13px 8px;
    background: var(--ui-bg); border: 1px solid var(--ui-bd);
    color: var(--dim); font-size: 0.82rem;
    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  }
  .btn-ghost:not(:disabled):hover { background: rgba(0,0,0,0.65); color: var(--text); }

  .btn-util {
    padding: 10px 14px;
    background: var(--ui-bg); border: 1px solid var(--ui-bd);
    color: var(--faint); font-size: 0.72rem; border-radius: 9px;
    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  }
  .btn-util:not(:disabled):hover { background: rgba(0,0,0,0.65); color: var(--dim); }

  .btn-alm {
    width: 100%; padding: 13px;
    background: rgba(196,96,80,0.82); color: #fff;
    font-size: 0.9rem; font-weight: 700;
    animation: apls 1.1s ease-in-out infinite;
  }
  @keyframes apls { 0%,100%{transform:scale(1)} 50%{transform:scale(1.02)} }

  /* ━━━ Stopwatch ━━━ */
  #sw-wrap {
    display: flex; flex-direction: column; align-items: center; gap: 18px;
    width: 100%; max-width: 300px;
  }
  #swdisp {
    font-family: 'Inter', sans-serif;
    font-size: 3.7rem; font-weight: 800;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.05em;
    text-shadow: 0 2px 28px rgba(0,0,0,0.75);
  }

  /* ━━━ Footer / bg selector ━━━ */
  footer {
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 22px 20px;
    background: linear-gradient(to top, rgba(0,0,0,0.62) 0%, transparent 100%);
  }

  .bglist {
    display: flex; gap: 8px; overflow-x: auto;
    -webkit-overflow-scrolling: touch; scrollbar-width: none;
  }
  .bglist::-webkit-scrollbar { display: none; }

  .bgsw {
    flex-shrink: 0;
    width: 56px; height: 42px; border-radius: 8px;
    background-size: cover; background-position: center;
    border: 2px solid transparent; cursor: pointer;
    transition: transform 0.18s, border-color 0.18s, box-shadow 0.18s;
  }
  .bgsw:hover { transform: scale(1.08); }
  .bgsw.on { border-color: rgba(255,255,255,0.88); box-shadow: 0 0 14px rgba(255,255,255,0.26); }

  .futil { display: flex; gap: 8px; flex-shrink: 0; margin-left: 12px; }

  /* ━━━ Fullscreen mode ━━━ */
  #app.fs header,
  #app.fs footer,
  #app.fs .tabs,
  #app.fs #slbl,
  #app.fs #tctrl { display: none !important; }

  #app.fs .center { padding: 0; pointer-events: none; }
  #app.fs .center > * { pointer-events: auto; }

  #app.fs .ring-wrap {
    width: min(66vmin, 460px) !important;
    height: min(66vmin, 460px) !important;
  }
  #app.fs #tdisp { font-size: clamp(4rem, 13vmin, 8.5rem) !important; }

  /* FS overlay controls */
  #fsui {
    display: none;
    position: fixed; inset: 0; z-index: 20;
    pointer-events: none;
  }
  #fs-back {
    position: absolute; top: 22px; right: 24px; pointer-events: auto;
    background: var(--ui-bg); border: 1px solid var(--ui-bd); border-radius: 9px;
    color: var(--dim);
    font-family: inherit; font-size: 0.75rem; font-weight: 500;
    letter-spacing: 0.06em; padding: 8px 18px; cursor: pointer;
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    transition: background 0.2s, color 0.2s;
  }
  #fs-back:hover { background: rgba(0,0,0,0.7); color: var(--text); }

  #fs-alm {
    display: none; pointer-events: auto;
    position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%);
    background: rgba(196,96,80,0.9); border: none; border-radius: 14px;
    color: #fff; font-family: inherit; font-size: 1rem; font-weight: 700;
    letter-spacing: 0.06em; padding: 15px 52px; cursor: pointer;
    white-space: nowrap;
    animation: apls 1.1s ease-in-out infinite;
  }

  /* ━━━ Responsive ━━━ */
  @media (max-width: 480px) {
    :root { --rs: 218px; }
    header { padding: 15px 18px 0; }
    #ct { font-size: 0.98rem; }
    .logo-mark { font-size: 0.6rem; }
    .tab { padding: 6px 16px; font-size: 0.76rem; }
    .tabs { margin-bottom: 10px; }
    #tdisp { font-size: 2.25rem !important; }
    #swdisp { font-size: 2.9rem; }
    footer { padding: 8px 16px 16px; }
    .bgsw { width: 48px; height: 36px; }
    #tctrl { max-width: 272px; gap: 7px; margin-top: 12px; }
  }
  @media (max-height: 640px) {
    :root { --rs: 194px; }
    header { padding: 11px 20px 0; }
    .tabs { margin-bottom: 8px; }
    #slbl { margin-bottom: 4px; }
    #tdisp { font-size: 2.1rem !important; }
    #tctrl { gap: 6px; margin-top: 10px; }
    .btn-go, .btn-ghost { padding: 10px 8px; }
    .pst { padding: 6px 2px; }
  }
  </style>
</head>
<body>

<!-- Backgrounds (always full-screen) -->
<div id="bg-a"></div>
<div id="bg-b"></div>
<div id="ov"></div>
<div id="flash"></div>

<!-- Fullscreen UI overlay -->
<div id="fsui">
  <button id="fs-back" onclick="exitFS()">戻る</button>
  <button id="fs-alm" onclick="stopAlarm()">🔔 アラーム停止</button>
</div>

<!-- App -->
<div id="app">

  <!-- Header -->
  <header>
    <div>
      <div class="logo-mark">Highsto Timer</div>
      <div class="logo-sub">集中と対戦の時間管理</div>
    </div>
    <div class="hclock">
      <span id="ct">00:00:00</span>
      <span id="cd"></span>
    </div>
  </header>

  <!-- Center area -->
  <div class="center">

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" id="tab-t" onclick="sw('t')">タイマー</button>
      <button class="tab"        id="tab-s" onclick="sw('s')">ストップウォッチ</button>
    </div>

    <!-- ══ TIMER ══ -->
    <div id="at">
      <div id="slbl">待機中</div>

      <div class="ring-wrap">
        <svg class="ring-svg" viewBox="0 0 300 300">
          <circle class="rt" cx="150" cy="150" r="132"/>
          <circle class="rp" id="rp"  cx="150" cy="150" r="132"/>
        </svg>
        <div class="ri">
          <span id="tdisp">--:--</span>
          <div id="tsub"></div>
        </div>
      </div>

      <div id="tctrl">

        <!-- IDLE -->
        <div id="ci">
          <div class="mtgl">
            <button class="mbtn active" id="m-m" onclick="setM('m')">分数指定</button>
            <button class="mbtn"        id="m-e" onclick="setM('e')">終了時刻指定</button>
          </div>
          <div id="f-m" class="irow">
            <input type="number" id="n-m" min="1" max="999" placeholder="10">
            <span class="iunit">分</span>
          </div>
          <div id="f-e" class="irow" style="display:none">
            <input type="time" id="n-e">
          </div>
          <div class="ferr" id="ferr"></div>
          <div class="psets">
            <button class="pst" onclick="doPre(5)">5分</button>
            <button class="pst" onclick="doPre(10)">10分</button>
            <button class="pst" onclick="doPre(20)">20分</button>
            <button class="pst" onclick="doPre(30)">30分</button>
            <button class="pst" onclick="doPre(60)">60分</button>
          </div>
          <div class="brow">
            <button class="btn btn-go" onclick="startT()">開始</button>
          </div>
          <div style="display:flex;gap:8px;justify-content:center">
            <button class="btn btn-util" id="bmute" onclick="togMute()">🔊 ミュート</button>
          </div>
        </div>

        <!-- RUNNING -->
        <div id="cr" style="display:none">
          <div class="brow">
            <button class="btn btn-ghost" style="flex:1" onclick="cancelT()">キャンセル</button>
            <button class="btn btn-util"  style="padding:13px 18px;" onclick="enterFS()">⛶ 全画面</button>
          </div>
        </div>

        <!-- ALARM -->
        <div id="ca" style="display:none">
          <div class="brow">
            <button class="btn btn-alm" onclick="stopAlarm()">🔔 アラーム停止</button>
          </div>
        </div>

      </div><!-- #tctrl -->
    </div><!-- #at -->

    <!-- ══ STOPWATCH ══ -->
    <div id="as" style="display:none">
      <div id="sw-wrap">
        <span id="swdisp">00:00.00</span>
        <div class="brow">
          <button class="btn btn-go"    id="sw-s"  onclick="swSt()">開始</button>
          <button class="btn btn-ghost" id="sw-p"  onclick="swPa()" disabled>停止</button>
          <button class="btn btn-ghost" id="sw-r"  onclick="swRe()">リセット</button>
        </div>
      </div>
    </div>

  </div><!-- .center -->

  <!-- Footer: background picker -->
  <footer>
    <div class="bglist" id="bglist"></div>
    <div class="futil" id="futil"></div>
  </footer>

</div><!-- #app -->

<script>
'use strict';

/* ── Ring geometry ── */
const RC = 132, CIRC = +(2 * Math.PI * RC).toFixed(2); // ≈ 829.4

/* ── Backgrounds ── */
const BGS = [
  { id:'b1', n:'ジェンキンス', s:'background/ジェンキンス.png' },
  { id:'b2', n:'全員集合',     s:'background/全員集合.png'     },
  { id:'b3', n:'坂本龍馬',     s:'background/坂本龍馬.png'     },
  { id:'b4', n:'沖田総司',     s:'background/沖田総司.png'     },
];
let bgLay = 'a';

function buildPicker() {
  const list = el('bglist');
  BGS.forEach(b => {
    const d = document.createElement('div');
    d.className = 'bgsw' + (b.id === S.bg ? ' on' : '');
    d.dataset.id = b.id;
    d.style.backgroundImage = `url("${b.s}")`;
    d.title = b.n;
    d.onclick = () => changeBg(b, true);
    list.appendChild(d);
  });
}

function changeBg(b, anim) {
  S.bg = b.id;
  const url = `url("${b.s}")`;
  if (!anim) {
    el('bg-a').style.backgroundImage = url;
    bgLay = 'a';
  } else {
    const nx = bgLay === 'a' ? 'b' : 'a';
    const en = el('bg-' + nx), ec = el('bg-' + bgLay);
    en.style.transition = 'none'; en.style.opacity = '0';
    en.style.backgroundImage = url;
    en.getBoundingClientRect();
    en.style.transition = 'opacity 1.1s ease'; en.style.opacity = '1';
    ec.style.transition = 'opacity 1.1s ease'; ec.style.opacity = '0';
    bgLay = nx;
  }
  document.querySelectorAll('.bgsw').forEach(d =>
    d.classList.toggle('on', d.dataset.id === b.id));
  save();
}

/* ── State ── */
let S = {
  tab:'t', mode:'m', min:'', end:'', muted:false, bg:'b1',
  run:false, endTs:0, total:0, fin:false, alm:false, tid:null,
  swRun:false, swTs:0, swEl:0, swTid:null,
  isFS:false,
};

/* ── Persist ── */
function save() {
  try { localStorage.setItem('hst6', JSON.stringify(
    {tab:S.tab,mode:S.mode,min:S.min,end:S.end,muted:S.muted,bg:S.bg}
  )); } catch(e) {}
}
function load() {
  try {
    const d = JSON.parse(localStorage.getItem('hst6')||'{}');
    if(d.tab)  S.tab  = d.tab;
    if(d.mode) S.mode = d.mode;
    if(d.min)  S.min  = d.min;
    if(d.end)  S.end  = d.end;
    if(typeof d.muted==='boolean') S.muted = d.muted;
    if(d.bg)   S.bg   = d.bg;
  } catch(e) {}
}

/* ── Clock ── */
const WD = ['日','月','火','水','木','金','土'];
const p2 = n => String(n).padStart(2,'0');
function clock() {
  const j = new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Tokyo'}));
  el('ct').textContent = `${p2(j.getHours())}:${p2(j.getMinutes())}:${p2(j.getSeconds())}`;
  el('cd').textContent = `${j.getFullYear()}/${p2(j.getMonth()+1)}/${p2(j.getDate())}(${WD[j.getDay()]})`;
}

/* ── Tab ── */
function sw(t) {
  S.tab = t;
  el('tab-t').classList.toggle('active', t==='t');
  el('tab-s').classList.toggle('active', t==='s');
  el('at').style.display = t==='t' ? '' : 'none';
  el('as').style.display = t==='s' ? '' : 'none';
  save();
}

/* ── Timer mode ── */
function setM(m) {
  S.mode = m;
  el('m-m').classList.toggle('active', m==='m');
  el('m-e').classList.toggle('active', m==='e');
  el('f-m').style.display = m==='m' ? '' : 'none';
  el('f-e').style.display = m==='e' ? '' : 'none';
  el('ferr').textContent = '';
  save();
}

/* ── Timer control state ── */
function setState(s) {
  el('ci').style.display = s==='idle'    ? '' : 'none';
  el('cr').style.display = s==='running' ? '' : 'none';
  el('ca').style.display = s==='alarm'   ? '' : 'none';
  const L = {idle:'待機中', running:'残り時間', alarm:'TIME UP'};
  el('slbl').textContent = L[s] || '';
}

/* ── Timer ── */
function doPre(m) {
  if (S.run || S.alm) return;
  setM('m'); el('n-m').value = m; S.min = m;
  go(m * 60);
}

function startT() {
  if (S.run || S.alm) return;
  el('ferr').textContent = '';
  if (S.mode === 'm') {
    const v = parseInt(el('n-m').value, 10);
    if (!v || v < 1) { el('ferr').textContent = '1以上の整数を入力してください'; return; }
    S.min = v; save(); go(v * 60);
  } else {
    const ts = el('n-e').value;
    if (!ts) { el('ferr').textContent = '終了時刻を入力してください'; return; }
    const [h,m] = ts.split(':').map(Number);
    const now = new Date();
    const diff = Math.floor((new Date(now.getFullYear(),now.getMonth(),now.getDate(),h,m,0,0) - now)/1000);
    if (diff <= 0) { el('ferr').textContent = '現在時刻より後を指定してください'; return; }
    S.end = ts; save(); go(diff);
  }
}

function go(sec) {
  S.run=true; S.fin=false; S.total=sec; S.endTs=Date.now()+sec*1000;
  setState('running');
  clearInterval(S.tid); S.tid = setInterval(tick, 250); tick();
}

function tick() {
  if (!S.run) return;
  const rem = Math.max(0, Math.ceil((S.endTs - Date.now())/1000));
  drawRing(rem);
  el('flash').classList.toggle('on', rem>0 && rem<=5);
  if (rem <= 0) timeup();
}

function drawRing(rem) {
  el('tdisp').textContent = `${p2(Math.floor(rem/60))}:${p2(rem%60)}`;
  const off = CIRC * (1 - Math.max(0, Math.min(1, S.total>0 ? rem/S.total : 0)));
  const r = el('rp');
  r.style.strokeDasharray  = CIRC;
  r.style.strokeDashoffset = off;
  r.style.stroke = (rem>0 && rem<=5) ? '#c97060' : 'var(--gold)';
}

function timeup() {
  clearInterval(S.tid);
  S.run=false; S.fin=true; S.alm=true;
  el('flash').classList.remove('on');
  el('tdisp').textContent = '00:00'; el('tsub').textContent = 'TIME UP';
  drawRing(0); setState('alarm');
  if (S.isFS) el('fs-alm').style.display = '';
  if (!S.muted) alarmGo();
}

function cancelT() {
  clearInterval(S.tid); S.run=false; S.fin=false; S.alm=false;
  el('flash').classList.remove('on'); alarmStop();
  el('tdisp').textContent='--:--'; el('tsub').textContent='';
  rstRing(); setState('idle');
}

function rstRing() {
  const r = el('rp');
  r.style.strokeDasharray = CIRC; r.style.strokeDashoffset = CIRC; r.style.stroke='var(--gold)';
}

/* ── Alarm ── */
let actx=null, almId=null;
function getCtx() {
  if (!actx||actx.state==='closed') actx=new(window.AudioContext||window.webkitAudioContext)();
  if (actx.state==='suspended') actx.resume(); return actx;
}
function beep() {
  try {
    const c=getCtx(),t=c.currentTime;
    const o1=c.createOscillator(),o2=c.createOscillator(),g=c.createGain();
    o1.connect(g);o2.connect(g);g.connect(c.destination);
    o1.type='square';o1.frequency.value=880;
    o2.type='square';o2.frequency.value=660;
    g.gain.setValueAtTime(0.17,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.42);
    o1.start(t);o1.stop(t+0.14);o2.start(t+0.14);o2.stop(t+0.42);
  } catch(e) {}
}
function alarmGo() { beep(); almId=setInterval(beep,1300); }
function alarmStop() { clearInterval(almId); }

function stopAlarm() {
  alarmStop(); S.alm=false;
  el('fs-alm').style.display='none';
  el('tdisp').textContent='--:--'; el('tsub').textContent='';
  rstRing(); setState('idle');
}

function togMute() {
  S.muted=!S.muted;
  el('bmute').textContent = S.muted ? '🔇 ミュート中' : '🔊 ミュート';
  if (S.muted) clearInterval(almId); else if (S.alm) alarmGo();
  save();
}

/* ── Fullscreen ── */
function enterFS() {
  if (!S.run && !S.alm && !S.fin) return;
  S.isFS=true; el('app').classList.add('fs'); el('fsui').style.display='flex';
  if (S.alm) el('fs-alm').style.display='';
}
function exitFS() {
  S.isFS=false; el('app').classList.remove('fs'); el('fsui').style.display='none';
  el('fs-alm').style.display='none';
}

/* ── Stopwatch ── */
function swSt() {
  if (S.swRun) return;
  S.swRun=true; S.swTs=Date.now()-S.swEl;
  el('sw-s').disabled=true; el('sw-p').disabled=false;
  S.swTid=setInterval(swDraw,17); swDraw();
}
function swPa() {
  if (!S.swRun) return;
  S.swRun=false; S.swEl=Date.now()-S.swTs; clearInterval(S.swTid);
  el('sw-s').disabled=false; el('sw-p').disabled=true;
}
function swRe() {
  clearInterval(S.swTid); S.swRun=false; S.swEl=0; S.swTs=0;
  el('swdisp').textContent='00:00.00'; el('sw-s').disabled=false; el('sw-p').disabled=true;
}
function swDraw() {
  const e=S.swRun?Date.now()-S.swTs:S.swEl;
  el('swdisp').textContent=`${p2(Math.floor(e/60000))}:${p2(Math.floor(e/1000)%60)}.${p2(Math.floor(e/10)%100)}`;
}

/* ── Util ── */
function el(id) { return document.getElementById(id); }

/* ── Init ── */
function init() {
  load();

  // Apply background
  const bg = BGS.find(b=>b.id===S.bg)||BGS[0];
  el('bg-a').style.backgroundImage = `url("${bg.s}")`;

  // Ring
  rstRing();

  // Build pickers
  buildPicker();

  // UI state
  sw(S.tab); setM(S.mode); setState('idle');
  if (S.min) el('n-m').value = S.min;
  if (S.end) el('n-e').value = S.end;
  el('bmute').textContent = S.muted ? '🔇 ミュート中' : '🔊 ミュート';

  // Listeners
  el('n-m').addEventListener('input',  function(){ S.min=this.value; save(); });
  el('n-e').addEventListener('change', function(){ S.end=this.value; save(); });

  // Clock
  clock(); setInterval(clock, 1000);
}

init();
</script>
