<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Highsto Timer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
  :root {
    --gold:      #c8a44a;
    --gold-glow: rgba(200,164,74,0.30);
    --danger:    #c96858;
    --text:      rgba(255,255,255,0.95);
    --dim:       rgba(255,255,255,0.52);
    --faint:     rgba(255,255,255,0.30);
    --ui-bg:     rgba(0,0,0,0.50);
    --ui-bd:     rgba(255,255,255,0.12);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }

  body {
    min-height: 100dvh;
    overflow: hidden;
    font-family: 'Inter', 'Hiragino Kaku Gothic ProN', sans-serif;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }

  /* ── Backgrounds ── */
  #bg-a, #bg-b {
    position: fixed; inset: 0; z-index: 0;
    background-size: cover; background-position: center center;
    transition: opacity 1.2s ease;
  }
  #bg-a { opacity: 1; }
  #bg-b { opacity: 0; }

  #ov {
    position: fixed; inset: 0; z-index: 1;
    background:
      radial-gradient(ellipse at 50% 42%, transparent 28%, rgba(0,0,0,0.52) 100%),
      rgba(0,0,0,0.24);
  }

  #flash {
    display: none; position: fixed; inset: 0; z-index: 2;
    background: rgba(140,30,16,0.28); pointer-events: none;
    animation: blink 0.65s ease-in-out infinite;
  }
  #flash.on { display: block; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  /* ── Auto-hide ── */
  .ui-hide { transition: opacity 0.7s ease; }
  body.ui-off .ui-hide { opacity: 0 !important; pointer-events: none !important; }
  body.ui-off { cursor: none; }

  /* ── App shell ── */
  #app {
    position: fixed; inset: 0; z-index: 10;
    display: flex; flex-direction: column;
    pointer-events: none;
  }
  #app > * { pointer-events: auto; }

  /* ── Header ── */
  header {
    display: flex; align-items: flex-start; justify-content: space-between;
    padding: 22px 26px 0; flex-shrink: 0;
  }
  .logo-mark {
    font-size: 0.68rem; font-weight: 800;
    letter-spacing: 0.26em; text-transform: uppercase;
    color: var(--gold); text-shadow: 0 0 20px var(--gold-glow);
    margin-bottom: 3px; line-height: 1;
  }
  .logo-sub { font-size: 0.58rem; color: var(--faint); letter-spacing: 0.08em; }
  .hclock { text-align: right; }
  #ct {
    display: block; font-family: 'Inter', sans-serif;
    font-size: 1.18rem; font-weight: 600;
    font-variant-numeric: tabular-nums; letter-spacing: 0.04em;
    line-height: 1; text-shadow: 0 1px 10px rgba(0,0,0,0.8); margin-bottom: 3px;
  }
  #cd { font-size: 0.64rem; color: var(--dim); letter-spacing: 0.05em; }

  /* ── Center ── */
  .center {
    flex: 1; min-height: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 8px 20px 88px;
    user-select: none;
  }

  #at, #as {
    display: flex; flex-direction: column; align-items: center;
  }

  /* Status label */
  #slbl {
    font-size: 0.62rem; font-weight: 500;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--faint); text-shadow: 0 1px 8px rgba(0,0,0,0.9);
    margin-bottom: 12px; min-height: 1em; text-align: center;
  }

  /* Timer display */
  #tdisp {
    display: block; font-family: 'Inter', sans-serif;
    font-size: clamp(4rem, 13vmin, 7.5rem);
    font-weight: 800; font-variant-numeric: tabular-nums;
    letter-spacing: 0.02em; line-height: 1;
    text-shadow: 0 2px 40px rgba(0,0,0,0.75); text-align: center;
    transition: font-size 0.2s;
  }
  #tdisp[data-len="hour"] { font-size: clamp(2.8rem, 9vmin, 5.5rem); }
  #tdisp[data-len="day"]  { font-size: clamp(2.2rem, 7vmin, 4.2rem); }

  /* Progress bar */
  #pbw {
    width: min(280px, 72vw); height: 3px;
    background: rgba(255,255,255,0.14); border-radius: 2px;
    margin-top: 18px; overflow: hidden;
  }
  #pbf {
    height: 100%; width: 0%;
    background: var(--gold); border-radius: 2px;
    transition: width 0.75s linear, background 0.3s;
  }

  /* Stopwatch display */
  #swdisp {
    display: block; font-family: 'Inter', sans-serif;
    font-size: clamp(3.2rem, 10vmin, 6rem);
    font-weight: 800; font-variant-numeric: tabular-nums;
    letter-spacing: 0.05em; text-shadow: 0 2px 40px rgba(0,0,0,0.75);
    text-align: center;
  }

  /* ── Icon bar ── */
  #iconbar {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    padding: 14px 28px max(22px, env(safe-area-inset-bottom));
    display: flex; gap: 20px; align-items: center; z-index: 30;
  }
  .ibtn {
    width: 52px; height: 52px; border-radius: 50%;
    background: rgba(0,0,0,0.42); border: 1px solid rgba(255,255,255,0.14);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: background 0.18s, transform 0.14s, border-color 0.18s;
    color: rgba(255,255,255,0.65);
  }
  .ibtn:hover { background: rgba(0,0,0,0.62); transform: scale(1.07); }
  .ibtn.active {
    background: rgba(200,164,74,0.28); border-color: rgba(200,164,74,0.55);
    color: var(--gold);
  }
  .ibtn svg { width: 22px; height: 22px; display: block; }

  /* ── Panels ── */
  .panel {
    position: fixed; bottom: 90px; left: 50%;
    transform: translateX(-50%) translateY(14px);
    opacity: 0; pointer-events: none;
    transition: opacity 0.28s ease, transform 0.28s ease;
    z-index: 28;
    background: rgba(6,8,20,0.78);
    backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 20px; padding: 20px;
    width: min(360px, 92vw);
  }
  .panel.open { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: auto; }

  /* Panel: bg grid */
  .bg-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; }
  .bgsw {
    aspect-ratio: 4/3; border-radius: 10px;
    background-size: cover; background-position: center;
    border: 2px solid transparent; cursor: pointer;
    transition: transform 0.18s, border-color 0.18s;
  }
  .bgsw:hover { transform: scale(1.06); }
  .bgsw.on { border-color: rgba(255,255,255,0.80); }

  /* Panel: settings sections */
  .pset-section { display: flex; flex-direction: column; gap: 9px; }

  .mtgl {
    display: flex; background: rgba(0,0,0,0.35); border: 1px solid var(--ui-bd);
    border-radius: 9px; padding: 3px; gap: 2px;
  }
  .mbtn {
    flex: 1; padding: 7px 0; background: transparent; border: none; border-radius: 7px;
    color: var(--faint); font-family: inherit; font-size: 0.72rem; font-weight: 600;
    letter-spacing: 0.04em; cursor: pointer; transition: background 0.18s, color 0.18s;
  }
  .mbtn.active { background: rgba(255,255,255,0.13); color: var(--text); }

  .irow { display: flex; align-items: center; gap: 8px; }
  input[type="number"], input[type="time"], input[type="datetime-local"] {
    flex: 1; background: rgba(0,0,0,0.35); border: 1px solid var(--ui-bd);
    border-radius: 10px; color: var(--text);
    font-family: 'Inter', sans-serif; font-size: 1.4rem; font-weight: 700;
    font-variant-numeric: tabular-nums; padding: 9px 14px; text-align: center;
    transition: border-color 0.2s, box-shadow 0.2s;
    -webkit-appearance: none; appearance: none;
  }
  input[type="datetime-local"] {
    font-size: 1rem; letter-spacing: 0.02em;
    color-scheme: dark;
  }
  input:focus {
    outline: none; border-color: rgba(200,164,74,0.6);
    box-shadow: 0 0 0 3px rgba(200,164,74,0.14);
  }
  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
  input[type="number"] { -moz-appearance: textfield; }
  .iunit { font-size: 0.78rem; color: var(--dim); flex-shrink: 0; }
  .ferr  { font-size: 0.68rem; color: var(--danger); min-height: 1em; }

  .psets { display: flex; gap: 5px; }
  .pst {
    flex: 1; padding: 7px 2px;
    background: rgba(0,0,0,0.30); border: 1px solid var(--ui-bd); border-radius: 8px;
    color: var(--dim); font-family: inherit; font-size: 0.71rem; font-weight: 600;
    cursor: pointer; transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  .pst:hover { background: rgba(200,164,74,0.22); border-color: rgba(200,164,74,0.4); color: var(--gold); }

  .brow { display: flex; gap: 7px; }
  .btn {
    border: none; border-radius: 11px;
    font-family: inherit; font-weight: 600; cursor: pointer;
    letter-spacing: 0.04em; transition: filter 0.15s, opacity 0.15s;
  }
  .btn:disabled { opacity: 0.28; cursor: not-allowed; }
  .btn-go {
    flex: 2; padding: 13px 10px;
    background: linear-gradient(140deg, #d4af52 0%, #a8832c 100%);
    color: #09090f; font-size: 0.9rem; font-weight: 700;
  }
  .btn-go:not(:disabled):hover { filter: brightness(1.1); }
  .btn-ghost {
    flex: 1; padding: 13px 8px;
    background: rgba(0,0,0,0.40); border: 1px solid var(--ui-bd);
    color: var(--dim); font-size: 0.82rem;
  }
  .btn-ghost:not(:disabled):hover { color: var(--text); }
  .btn-util {
    padding: 10px 14px; background: rgba(0,0,0,0.40); border: 1px solid var(--ui-bd);
    color: var(--faint); font-size: 0.72rem; border-radius: 9px;
  }
  .btn-util:not(:disabled):hover { color: var(--dim); }
  .btn-fs {
    flex: 1; padding: 13px 8px;
    background: rgba(0,0,0,0.40); border: 1px solid var(--ui-bd);
    color: var(--faint); font-size: 0.82rem; border-radius: 11px;
    font-family: inherit; font-weight: 600; cursor: pointer;
    transition: color 0.15s;
  }
  .btn-fs:hover { color: var(--dim); }

  /* Slideshow toggle */
  .ss-row {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 12px; padding-top: 12px;
    border-top: 1px solid rgba(255,255,255,0.07);
  }
  .ss-label { font-size: 0.70rem; color: var(--faint); }
  .tog {
    width: 42px; height: 24px; border-radius: 12px; flex-shrink: 0;
    background: rgba(255,255,255,0.14); border: none; cursor: pointer;
    position: relative; transition: background 0.22s;
  }
  .tog::after {
    content: ''; position: absolute;
    width: 18px; height: 18px; border-radius: 50%;
    background: #fff; top: 3px; left: 3px;
    transition: transform 0.22s;
  }
  .tog.on { background: var(--gold); }
  .tog.on::after { transform: translateX(18px); }

  .btn-alm {
    width: 100%; padding: 13px;
    background: rgba(196,96,80,0.85); color: #fff;
    font-size: 0.9rem; font-weight: 700;
    animation: apls 1.1s ease-in-out infinite;
  }
  @keyframes apls { 0%,100%{transform:scale(1)} 50%{transform:scale(1.02)} }

  /* ── Fullscreen ── */
  body.fs header,
  body.fs #iconbar,
  body.fs .panel { display: none !important; }

  body.fs .center { padding: 0; }
  body.fs #tdisp                   { font-size: clamp(5rem, 18vmin, 12rem); }
  body.fs #tdisp[data-len="hour"] { font-size: clamp(3.5rem, 12vmin, 8rem); }
  body.fs #tdisp[data-len="day"]  { font-size: clamp(2.8rem, 9vmin, 6rem); }
  body.fs #pbw    { width: min(420px, 72vw); margin-top: 24px; height: 4px; }

  #fsui { display: none; position: fixed; inset: 0; z-index: 20; pointer-events: none; }
  #fs-back {
    position: absolute; top: 22px; right: 24px; pointer-events: auto;
    background: var(--ui-bg); border: 1px solid var(--ui-bd); border-radius: 9px;
    color: var(--dim); font-family: inherit; font-size: 0.75rem; font-weight: 500;
    letter-spacing: 0.06em; padding: 8px 18px; cursor: pointer;
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    transition: background 0.2s, color 0.2s;
  }
  #fs-back:hover { background: rgba(0,0,0,0.7); color: var(--text); }
  #fs-alm {
    display: none; pointer-events: auto;
    position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%);
    background: rgba(196,96,80,0.9); border: none; border-radius: 14px;
    color: #fff; font-family: inherit; font-size: 1rem; font-weight: 700;
    letter-spacing: 0.06em; padding: 15px 52px; cursor: pointer;
    white-space: nowrap; animation: apls 1.1s ease-in-out infinite;
  }

  /* ── Responsive ── */
  @media (max-width: 480px) {
    header { padding: 15px 18px 0; }
    #ct { font-size: 0.98rem; }
    .logo-mark { font-size: 0.6rem; }
    .panel { padding: 16px; }
    .ibtn { width: 46px; height: 46px; }
  }
  @media (max-height: 640px) {
    header { padding: 11px 20px 0; }
    .center { padding-bottom: 72px; }
  }
  </style>
</head>
<body>

<div id="bg-a"></div>
<div id="bg-b"></div>
<div id="ov"></div>
<div id="flash"></div>

<!-- Panel: background picker -->
<div id="panel-bg" class="panel ui-hide">
  <div class="bg-grid" id="bglist"></div>
  <div class="ss-row">
    <span class="ss-label">スライドショー（30秒ごとに切替）</span>
    <button class="tog" id="ss-tog" onclick="toggleSS()"></button>
  </div>
</div>

<!-- Panel: settings -->
<div id="panel-set" class="panel ui-hide">

  <!-- Timer: idle -->
  <div id="ci" class="pset-section">
    <div class="mtgl">
      <button class="mbtn active" id="m-m" onclick="setM('m')">分数指定</button>
      <button class="mbtn"        id="m-e" onclick="setM('e')">終了日時指定</button>
    </div>
    <div id="f-m" class="irow">
      <input type="number" id="n-m" min="1" max="999" placeholder="10">
      <span class="iunit">分</span>
    </div>
    <div id="f-e" class="irow" style="display:none">
      <input type="datetime-local" id="n-e">
    </div>
    <div class="ferr" id="ferr"></div>
    <div class="psets">
      <button class="pst" onclick="doPre(5)">5分</button>
      <button class="pst" onclick="doPre(10)">10分</button>
      <button class="pst" onclick="doPre(20)">20分</button>
      <button class="pst" onclick="doPre(30)">30分</button>
      <button class="pst" onclick="doPre(60)">60分</button>
    </div>
    <div class="brow">
      <button class="btn btn-go" onclick="startT()">開始</button>
    </div>
    <div class="brow">
      <button class="btn btn-util" id="bmute" onclick="togMute()">🔊 ミュート</button>
      <button class="btn btn-fs" onclick="enterFS()">⛶ 全画面</button>
    </div>
  </div>

  <!-- Timer: running -->
  <div id="cr" class="pset-section" style="display:none">
    <div class="brow">
      <button class="btn btn-ghost" style="flex:1" onclick="cancelT()">キャンセル</button>
      <button class="btn btn-util"  style="padding:13px 18px" onclick="enterFS()">⛶ 全画面</button>
    </div>
  </div>

  <!-- Timer: alarm -->
  <div id="ca" class="pset-section" style="display:none">
    <button class="btn btn-alm" onclick="stopAlarm()">🔔 アラーム停止</button>
  </div>

  <!-- Stopwatch controls -->
  <div id="pset-s" class="pset-section" style="display:none">
    <div class="brow">
      <button class="btn btn-go"    id="sw-s" onclick="swSt()" style="flex:1">開始</button>
      <button class="btn btn-ghost" id="sw-p" onclick="swPa()" disabled style="flex:1">停止</button>
      <button class="btn btn-ghost" id="sw-r" onclick="swRe()" style="flex:1">リセット</button>
    </div>
  </div>

</div>

<!-- Icon bar -->
<div id="iconbar" class="ui-hide">
  <button class="ibtn" id="ibtn-bg" onclick="togglePanel('bg')" title="背景画像の変更">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="18" height="18" rx="2"/>
      <path d="M3 15 7 11l4 4 4-5 4 5"/>
      <circle cx="8.5" cy="8.5" r="1.5" fill="currentColor" stroke="none"/>
    </svg>
  </button>
  <button class="ibtn" id="ibtn-set" onclick="togglePanel('set')" title="タイマー設定">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="9"/>
      <polyline points="12 7 12 12 15.5 14"/>
    </svg>
  </button>
  <button class="ibtn" id="ibtn-sw" onclick="toggleMode()" title="ストップウォッチ切替">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="13" r="8"/>
      <polyline points="12 9 12 13 14.5 15.5"/>
      <path d="M9 2h6M12 2v2M19 5l-1.5 1.5"/>
    </svg>
  </button>
</div>

<!-- Fullscreen UI -->
<div id="fsui">
  <button id="fs-back" class="ui-hide" onclick="exitFS()">戻る</button>
  <button id="fs-alm" onclick="stopAlarm()">🔔 アラーム停止</button>
</div>

<!-- App -->
<div id="app">

  <header class="ui-hide">
    <div>
      <div class="logo-mark">Highsto Timer</div>
      <div class="logo-sub">集中と対戦の時間管理</div>
    </div>
    <div class="hclock">
      <span id="ct">00:00:00</span>
      <span id="cd"></span>
    </div>
  </header>

  <div class="center">

    <!-- Timer view -->
    <div id="at">
      <div id="slbl" class="ui-hide">待機中</div>
      <span id="tdisp">--:--</span>
      <div id="pbw">
        <div id="pbf"></div>
      </div>
    </div>

    <!-- Stopwatch view -->
    <div id="as" style="display:none">
      <span id="swdisp">00:00.00</span>
    </div>

  </div>
</div>

<script>
'use strict';

/* ── Backgrounds ── */
const BGS = [
  { id:'b1', n:'ジェンキンス', s:'background/ジェンキンス.webp' },
  { id:'b2', n:'全員集合',     s:'background/全員集合.webp'     },
  { id:'b3', n:'坂本龍馬',     s:'background/坂本龍馬.webp'     },
  { id:'b4', n:'沖田総司',     s:'background/沖田総司.webp'     },
];
let bgLay = 'a';

function buildPicker() {
  const list = el('bglist');
  BGS.forEach(b => {
    const d = document.createElement('div');
    d.className = 'bgsw' + (b.id === S.bg ? ' on' : '');
    d.dataset.id = b.id;
    d.style.backgroundImage = `url("${b.s}")`;
    d.title = b.n;
    d.onclick = () => { changeBg(b, true); resetIdle(); };
    list.appendChild(d);
  });
}

function changeBg(b, anim) {
  S.bg = b.id;
  const url = `url("${b.s}")`;
  if (!anim) {
    el('bg-a').style.backgroundImage = url;
    bgLay = 'a';
  } else {
    const nx = bgLay === 'a' ? 'b' : 'a';
    const en = el('bg-' + nx), ec = el('bg-' + bgLay);
    en.style.transition = 'none'; en.style.opacity = '0';
    en.style.backgroundImage = url;
    en.getBoundingClientRect();
    en.style.transition = 'opacity 1.1s ease'; en.style.opacity = '1';
    ec.style.transition = 'opacity 1.1s ease'; ec.style.opacity = '0';
    bgLay = nx;
  }
  document.querySelectorAll('.bgsw').forEach(d =>
    d.classList.toggle('on', d.dataset.id === b.id));
  save();
}

/* ── State ── */
let S = {
  tab:'t', mode:'m', min:'', end:'', muted:false, bg:'b1',
  run:false, endTs:0, total:0, fin:false, alm:false, tid:null,
  swRun:false, swTs:0, swEl:0, swTid:null,
  isFS:false,
};

/* ── Persist ── */
function save() {
  try {
    localStorage.setItem('hst7', JSON.stringify(
      {tab:S.tab, mode:S.mode, min:S.min, end:S.end, muted:S.muted, bg:S.bg}
    ));
  } catch(e) {}
}
function load() {
  try {
    const d = JSON.parse(localStorage.getItem('hst7') || '{}');
    if (d.tab)  S.tab  = d.tab;
    if (d.mode) S.mode = d.mode;
    if (d.min)  S.min  = d.min;
    if (d.end)  S.end  = d.end;
    if (typeof d.muted === 'boolean') S.muted = d.muted;
    if (d.bg)   S.bg   = d.bg;
  } catch(e) {}
}

/* ── Clock ── */
const WD = ['日','月','火','水','木','金','土'];
const p2 = n => String(n).padStart(2, '0');
function fmtTime(rem) {
  if (rem < 3600) {
    return `${p2(Math.floor(rem / 60))}:${p2(rem % 60)}`;
  } else if (rem < 86400) {
    return `${p2(Math.floor(rem / 3600))}:${p2(Math.floor((rem % 3600) / 60))}:${p2(rem % 60)}`;
  } else {
    const d = Math.floor(rem / 86400);
    return `${d}日 ${p2(Math.floor((rem % 86400) / 3600))}:${p2(Math.floor((rem % 3600) / 60))}:${p2(rem % 60)}`;
  }
}
function clock() {
  const j = new Date(new Date().toLocaleString('en-US', {timeZone:'Asia/Tokyo'}));
  el('ct').textContent = `${p2(j.getHours())}:${p2(j.getMinutes())}:${p2(j.getSeconds())}`;
  el('cd').textContent = `${j.getFullYear()}/${p2(j.getMonth()+1)}/${p2(j.getDate())}(${WD[j.getDay()]})`;
}

/* ── Mode switch ── */
function sw(t) {
  S.tab = t;
  el('at').style.display = t === 't' ? '' : 'none';
  el('as').style.display = t === 's' ? '' : 'none';
  el('ibtn-sw').classList.toggle('active', t === 's');
  if (t === 't') {
    el('pset-s').style.display = 'none';
    setState(S.alm ? 'alarm' : S.run ? 'running' : 'idle');
  } else {
    el('ci').style.display = 'none';
    el('cr').style.display = 'none';
    el('ca').style.display = 'none';
    el('pset-s').style.display = '';
    el('slbl').textContent = 'ストップウォッチ';
  }
  save();
}

function toggleMode() {
  closeAllPanels();
  sw(S.tab === 't' ? 's' : 't');
}

/* ── Timer input mode ── */
function toLocalDTStr(d) {
  return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}T${p2(d.getHours())}:${p2(d.getMinutes())}`;
}
function setM(m) {
  S.mode = m;
  el('m-m').classList.toggle('active', m === 'm');
  el('m-e').classList.toggle('active', m === 'e');
  el('f-m').style.display = m === 'm' ? '' : 'none';
  el('f-e').style.display = m === 'e' ? '' : 'none';
  el('ferr').textContent = '';
  if (m === 'e') {
    const inp = el('n-e');
    const now = new Date();
    inp.min = toLocalDTStr(now);
    if (!inp.value) {
      const def = new Date(now.getTime() + 60 * 60 * 1000);
      inp.value = toLocalDTStr(def);
      S.end = inp.value;
    }
  }
  save();
}

/* ── Timer state labels ── */
function setState(s) {
  el('ci').style.display = s === 'idle'    ? '' : 'none';
  el('cr').style.display = s === 'running' ? '' : 'none';
  el('ca').style.display = s === 'alarm'   ? '' : 'none';
  const L = { idle:'待機中', running:'残り時間', alarm:'TIME UP' };
  el('slbl').textContent = L[s] || '';
}

/* ── Timer ── */
function doPre(m) {
  if (S.run || S.alm) return;
  setM('m'); el('n-m').value = m; S.min = m;
  closeAllPanels();
  go(m * 60);
}

function startT() {
  if (S.run || S.alm) return;
  el('ferr').textContent = '';
  if (S.mode === 'm') {
    const v = parseInt(el('n-m').value, 10);
    if (!v || v < 1) { el('ferr').textContent = '1以上の整数を入力してください'; return; }
    S.min = v; save(); closeAllPanels(); go(v * 60);
  } else {
    const ts = el('n-e').value;
    if (!ts) { el('ferr').textContent = '終了日時を入力してください'; return; }
    const endDate = new Date(ts);
    const diff = Math.floor((endDate.getTime() - Date.now()) / 1000);
    if (diff <= 0) { el('ferr').textContent = '現在日時より後を指定してください'; return; }
    S.end = ts; save(); closeAllPanels(); go(diff);
  }
}

function go(sec) {
  S.run = true; S.fin = false; S.total = sec;
  S.endTs = Date.now() + sec * 1000;
  setState('running');
  const pbf = el('pbf');
  pbf.style.transition = 'none';
  pbf.style.width = '0%';
  pbf.getBoundingClientRect(); // force reflow
  pbf.style.transition = 'width 0.75s linear, background 0.3s';
  clearInterval(S.tid);
  S.tid = setInterval(tick, 250);
  tick();
}

function tick() {
  if (!S.run) return;
  const rem = Math.max(0, Math.ceil((S.endTs - Date.now()) / 1000));
  drawBar(rem);
  el('flash').classList.toggle('on', rem > 0 && rem <= 5);
  if (rem <= 0) timeup();
}

function drawBar(rem) {
  const td = el('tdisp');
  td.textContent = fmtTime(rem);
  td.dataset.len = rem >= 86400 ? 'day' : rem >= 3600 ? 'hour' : 'min';
  const elapsed = S.total - rem;
  const pct = S.total > 0 ? Math.min(100, elapsed / S.total * 100) : 0;
  el('pbf').style.width = pct + '%';
  el('pbf').style.background = (rem > 0 && rem <= 5) ? 'var(--danger)' : 'var(--gold)';
}

function timeup() {
  clearInterval(S.tid);
  S.run = false; S.fin = true; S.alm = true;
  el('flash').classList.remove('on');
  el('tdisp').textContent = '00:00';
  const pbf = el('pbf');
  pbf.style.transition = 'none'; pbf.style.width = '100%';
  setState('alarm');
  if (S.isFS) el('fs-alm').style.display = '';
  else openPanel('set');
  resetIdle();
  if (!S.muted) alarmGo();
}

function cancelT() {
  clearInterval(S.tid);
  S.run = false; S.fin = false; S.alm = false;
  el('flash').classList.remove('on');
  alarmStop();
  el('tdisp').textContent = '--:--';
  const pbf = el('pbf');
  pbf.style.transition = 'none'; pbf.style.width = '0%';
  setState('idle');
}

/* ── Alarm ── */
let actx = null, almId = null;
function getCtx() {
  if (!actx || actx.state === 'closed')
    actx = new (window.AudioContext || window.webkitAudioContext)();
  if (actx.state === 'suspended') actx.resume();
  return actx;
}
function beep() {
  try {
    const c = getCtx(), t = c.currentTime;
    const o1 = c.createOscillator(), o2 = c.createOscillator(), g = c.createGain();
    o1.connect(g); o2.connect(g); g.connect(c.destination);
    o1.type = 'square'; o1.frequency.value = 880;
    o2.type = 'square'; o2.frequency.value = 660;
    g.gain.setValueAtTime(0.17, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.42);
    o1.start(t); o1.stop(t + 0.14);
    o2.start(t + 0.14); o2.stop(t + 0.42);
  } catch(e) {}
}
function alarmGo()  { beep(); almId = setInterval(beep, 1300); }
function alarmStop() { clearInterval(almId); }

function stopAlarm() {
  alarmStop(); S.alm = false;
  el('fs-alm').style.display = 'none';
  el('tdisp').textContent = '--:--';
  const pbf = el('pbf');
  pbf.style.transition = 'none'; pbf.style.width = '0%';
  setState('idle');
  closeAllPanels();
}

function togMute() {
  S.muted = !S.muted;
  el('bmute').textContent = S.muted ? '🔇 ミュート中' : '🔊 ミュート';
  if (S.muted) clearInterval(almId);
  else if (S.alm) alarmGo();
  save();
}

/* ── Fullscreen ── */
function enterFS() {
  S.isFS = true;
  document.body.classList.add('fs');
  el('fsui').style.display = 'flex';
  if (S.alm) el('fs-alm').style.display = '';
  closeAllPanels();
  const el2 = document.documentElement;
  if (el2.requestFullscreen) el2.requestFullscreen().catch(() => {});
  else if (el2.webkitRequestFullscreen) el2.webkitRequestFullscreen();
}
function exitFS() {
  S.isFS = false;
  document.body.classList.remove('fs');
  el('fsui').style.display = 'none';
  el('fs-alm').style.display = 'none';
  if (document.fullscreenElement && document.exitFullscreen)
    document.exitFullscreen().catch(() => {});
  else if (document.webkitFullscreenElement && document.webkitExitFullscreen)
    document.webkitExitFullscreen();
}
document.addEventListener('fullscreenchange', () => {
  if (!document.fullscreenElement && S.isFS) exitFS();
});
document.addEventListener('webkitfullscreenchange', () => {
  if (!document.webkitFullscreenElement && S.isFS) exitFS();
});

/* ── Panels ── */
let openPanelId = null;

function openPanel(id) {
  if (openPanelId && openPanelId !== id) {
    el('panel-' + openPanelId).classList.remove('open');
    el('ibtn-' + openPanelId).classList.remove('active');
  }
  el('panel-' + id).classList.add('open');
  el('ibtn-' + id).classList.add('active');
  openPanelId = id;
}
function closePanel(id) {
  el('panel-' + id).classList.remove('open');
  el('ibtn-' + id).classList.remove('active');
  if (openPanelId === id) openPanelId = null;
}
function closeAllPanels() {
  ['bg', 'set'].forEach(id => closePanel(id));
}
function togglePanel(id) {
  if (el('panel-' + id).classList.contains('open')) closePanel(id);
  else openPanel(id);
}

/* ── Slideshow ── */
let ssTid = null;
function toggleSS() {
  const on = el('ss-tog').classList.toggle('on');
  if (on) {
    ssTid = setInterval(() => {
      const idx = BGS.findIndex(b => b.id === S.bg);
      changeBg(BGS[(idx + 1) % BGS.length], true);
    }, 30000);
  } else {
    clearInterval(ssTid); ssTid = null;
  }
}

/* ── Stopwatch ── */
function swSt() {
  if (S.swRun) return;
  S.swRun = true; S.swTs = Date.now() - S.swEl;
  el('sw-s').disabled = true; el('sw-p').disabled = false;
  S.swTid = setInterval(swDraw, 17); swDraw();
}
function swPa() {
  if (!S.swRun) return;
  S.swRun = false; S.swEl = Date.now() - S.swTs;
  clearInterval(S.swTid);
  el('sw-s').disabled = false; el('sw-p').disabled = true;
}
function swRe() {
  clearInterval(S.swTid); S.swRun = false; S.swEl = 0; S.swTs = 0;
  el('swdisp').textContent = '00:00.00';
  el('sw-s').disabled = false; el('sw-p').disabled = true;
}
function swDraw() {
  const e = S.swRun ? Date.now() - S.swTs : S.swEl;
  el('swdisp').textContent =
    `${p2(Math.floor(e/60000))}:${p2(Math.floor(e/1000)%60)}.${p2(Math.floor(e/10)%100)}`;
}

/* ── Auto-hide ── */
let idleTimer = null;
const IDLE_DELAY = 3500;

function resetIdle() {
  document.body.classList.remove('ui-off');
  clearTimeout(idleTimer);
  idleTimer = setTimeout(() => {
    closeAllPanels();
    document.body.classList.add('ui-off');
  }, IDLE_DELAY);
}

['mousemove', 'mousedown', 'touchstart', 'keydown'].forEach(ev =>
  document.addEventListener(ev, resetIdle, { passive: true }));

/* ── Util ── */
function el(id) { return document.getElementById(id); }

/* ── Init ── */
function init() {
  load();

  const bg = BGS.find(b => b.id === S.bg) || BGS[0];
  el('bg-a').style.backgroundImage = `url("${bg.s}")`;

  buildPicker();

  sw(S.tab);
  setM(S.mode);
  setState('idle');

  if (S.min) el('n-m').value = S.min;
  if (S.end) el('n-e').value = S.end;
  el('bmute').textContent = S.muted ? '🔇 ミュート中' : '🔊 ミュート';

  el('n-m').addEventListener('input',  function() { S.min = this.value; save(); });
  el('n-e').addEventListener('change', function() { S.end = this.value; save(); });

  clock();
  setInterval(clock, 1000);
  resetIdle();
}

init();
</script>
